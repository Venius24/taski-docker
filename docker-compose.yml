volumes:
  pg_data:
  static_volume: # <-- ДОБАВИЛИ ТОМ ДЛЯ СТАТИКИ

services:
  db:
    image: postgres:13.10
    env_file: .env
    volumes:
      - pg_data:/var/lib/postgresql/data
      
  backend:
    build: ./backend/
    env_file: .env
    volumes:
      - static_volume:/backend_static/ # <-- ПРОБРОСИЛИ ТОМ В БЭКЕНД

  frontend:
    env_file: .env
    build: ./frontend/
    command: cp -r /app/build/. /frontend_static/
    volumes:
      - static_volume:/frontend_static/ # <-- ПРОБРОСИЛИ ТОМ ВО ФРОНТЕНД

  gateway:
    build: ./gateway/
    ports:
      - 8000:80
    volumes:
      - static_volume:/staticfiles/ # <-- ПРОБРОСИЛИ ТОМ В NGINX (GATEWAY)